[tool.mypy]
python_version = "3.13"
ignore_missing_imports = true
warn_unused_ignores = true

[[tool.mypy.overrides]]
module = ["app.routers.aievaluate"]
ignore_errors = true

[tool.ruff.lint]
select = ["E", "F", "B"]
ignore = ["E501", "B904"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]
